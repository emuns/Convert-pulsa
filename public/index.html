<!DOCTYPE html>

  <title>Convert Pulsa</title>

  <link rel="stylesheet" href="/css/style.css">

  <div class="container">
    <h1>💰 Convert Pulsa</h1>
    <p>Tukar pulsa jadi saldo e-wallet / transfer bank</p>

    <form id="form">

      <select id="provider">

        <option value="xl">XL</option>
        <option value="axis">Axis</option>
      </select>

      <button type="submit">Hitung</button>
    </form>

    <div id="result"></div>

    <a class="wa" href="https://wa.me/628xxxxxxxxxx" target="_blank">
      Chat Admin WhatsApp
    </a>
  </div>

  <script src="/js/app.js"></script>
